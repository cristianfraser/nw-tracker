# Render blueprint — hosted recruiter demo (synthetic data, shared-password login).
# (The crfrsr.io landing page moved to Cloudflare Pages — it's a static site and needs
# neither a Render service nor a Render custom-domain slot.)
#
# Deploy: Render dashboard → New → Blueprint → connect this repo (this file is picked
# up) → set the AUTH_PASSWORD secret when prompted. In DEMO_MODE the /login page shows
# and prefills that password automatically. Recruiters log in on the in-app /login page
# with ANY syntactically-valid email + that password. See AGENTS.md "Hosted demo (Render)".
# The repo is safe to make public: tree and full git history are free of personal data
# (balances/amounts/account numbers purged; card last4s scrubbed from all history
# 2026-07-08; per-card config is gitignored; tests use synthetic cards). Author
# name/email appear as intentional attribution + the homepage contact link.
#
# Custom domains (Namecheap DNS, see AGENTS.md):
# - nw-tracker.crfrsr.io → nw-tracker-demo — only attaches when the workspace has a free
#   custom-domain slot (Hobby caps at 2/workspace, both used by pokedex). Until then the
#   demo is reached at its .onrender.com URL, which the homepage links to.
# - crfrsr.io / www.crfrsr.io → the homepage on Cloudflare Pages (not Render).
#
# Notes:
# - PORT is injected by Render; the server reads process.env.PORT.
# - No persistent disk on purpose: DEMO_MODE regenerates the synthetic DB from current
#   source on every cold start / deploy, so the demo always matches the deployed code.
# - startCommand runs the server from source via tsx (same as local dev, minus watch):
#   the compiled dist/ build would not ship server/migrations/*.sql. Build therefore
#   installs devDependencies explicitly (Render sets NODE_ENV=production by default).
# - DEMO_MODE defaults GLOBAL_SYNC_ENABLED / LIVE_QUOTES_SYNC_ENABLED / DB_BACKUP_ENABLED
#   to 0 (server/src/demoMode.ts); the dashboard cache warmer stays on for first paint.
# - Single-service same-origin (SERVE_CLIENT_DIST=1) — no CORS_ALLOWED_ORIGINS needed.
services:
  - type: web
    name: nw-tracker-demo
    runtime: node
    plan: starter
    domains:
      - nw-tracker.crfrsr.io
    buildCommand: npm install --include=dev && npm run build -w nw-tracker-client
    startCommand: npm run serve -w nw-tracker-server
    healthCheckPath: /api/health
    # Persistent disk for the recruiter-login log only. The synthetic demo DB
    # (NW_TRACKER_TEST_DB, a relative path → server/data/, ephemeral) still regenerates
    # every deploy so it always matches deployed code; DEMO_AUTH_LOG_DB lives on this disk
    # so demo_auth_logins survives regeneration. See server/src/demoAuthLog.ts.
    disk:
      name: nw-tracker-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      # Node version intentionally not set here: Render falls back to .nvmrc,
      # so the version is pinned in one place (paired with package.json engines).
      - key: HOST
        value: 0.0.0.0
      - key: DEMO_MODE
        value: "1"
      - key: SERVE_CLIENT_DIST
        value: "1"
      - key: NW_TRACKER_TEST_DB
        value: nw-tracker.demo.db
      - key: DEMO_AUTH_LOG_DB
        value: /var/data/demo-auth-logins.db
      # The shared demo password. It is intentionally public (recruiter self-serve): in
      # DEMO_MODE the /login page shows/prefills it, so no separate hint env is needed.
      - key: AUTH_PASSWORD
        sync: false
      # Optional: explicit HMAC secret for session cookies. Unset → derived from
      # AUTH_PASSWORD (rotating the password then invalidates existing sessions).
      - key: SESSION_SECRET
        generateValue: true
